name: Pytest → TestRail (Python)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest tests
        if: always()
        env:
          # TESTRAIL_ENABLED is false in CI — no live license needed.
          # The mock test suite (test_testrail_mock.py) validates all
          # TestRailClient behaviour using unittest.mock instead.
          # Set to "true" only when running against a real TestRail instance.
          TESTRAIL_ENABLED:    "false"
          TESTRAIL_URL:        ${{ secrets.TESTRAIL_URL }}
          TESTRAIL_USER:       ${{ secrets.TESTRAIL_USER }}
          TESTRAIL_API_KEY:    ${{ secrets.TESTRAIL_API_KEY }}
          TESTRAIL_PROJECT_ID: ${{ secrets.TESTRAIL_PROJECT_ID }}
          TESTRAIL_SUITE_ID:   ${{ secrets.TESTRAIL_SUITE_ID }}
          TESTRAIL_RUN_NAME:   "GitHub Actions Run - ${{ github.ref_name }} @ ${{ github.sha }}"
        run: |
          python -m pytest tests/ \
            --tb=short \
            --junitxml=reports/junit-report.xml \
            -v

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-junit-report
          path: reports/junit-report.xml
          retention-days: 30
